<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Kadesh Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body {
      margin: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    /* Tiled parchment background */
    #parchment-bg {
      position: fixed;
      inset: 0;
      background-image: url('Parchment_Tile.png');
      background-repeat: repeat;
      background-size: auto;
      z-index: 0;
    }

    /* Leaflet map layer */
    #map {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 1;
      background: transparent;
    }

    /* Remove Leaflet default gray */
    .leaflet-container {
      background: transparent;
    }
  </style>
</head>

<body>

<div id="parchment-bg"></div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  // Create map
  const map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -2,
    maxZoom: 4
  });

  // Image dimensions
  const imageWidth = 8192;
  const imageHeight = 8192;

  // Image bounds
  const bounds = [[0, 0], [imageHeight, imageWidth]];

  // Add map image
  L.imageOverlay('Kadesh.png', bounds).addTo(map);

  // Fit map to image
  map.fitBounds(bounds);

  // ============================================
  // TEST HEX: 300:300
  // AppSheet XY = 1.33,1
  // ============================================

  const centerX = (1.33 / 100) * imageWidth;
  const centerY = imageHeight - ((1 / 100) * imageHeight);

  // Actual measured interior size with slight inset
  const hexWidth = 105;
  const hexHeight = 155;

  // Flat-top stretched hex
  function makeHex(centerX, centerY, width, height) {
    return [
      [centerY, centerX + width],                         // Right
      [centerY + height * 0.5, centerX + width * 0.5],  // Bottom-right
      [centerY + height * 0.5, centerX - width * 0.5],  // Bottom-left
      [centerY, centerX - width],                         // Left
      [centerY - height * 0.5, centerX - width * 0.5],  // Top-left
      [centerY - height * 0.5, centerX + width * 0.5]   // Top-right
    ];
  }

// ============================================
// PROCEDURAL HEX GRID TEST
// Draws a 5x5 test section starting at 300:300
// ============================================

const startX = centerX;
const startY = centerY;

// Estimated spacing
const rowStepY = 162;   // 300:300 → 301:300
const oddColX = 162;    // 300:300 → 300:301
const oddColY = -81;    // negative because Leaflet Y is inverted visually
const colStepX = 324;   // 300:300 → 300:302

function getHexCenter(xxx, yyy) {
  const row = xxx - 300;
  const col = yyy - 300;

  const pair = Math.floor(col / 2);
  const odd = col % 2;

  const x =
    startX +
    (pair * colStepX) +
    (odd * oddColX);

  const y =
    startY -
    (row * rowStepY) +
    (odd * oddColY);

  return { x, y };
}

for (let xxx = 300; xxx < 305; xxx++) {
  for (let yyy = 300; yyy < 305; yyy++) {
    const { x, y } = getHexCenter(xxx, yyy);
    const hexId = `${xxx}:${yyy}`;

    const hex = L.polygon(
      makeHex(x, y, hexWidth, hexHeight),
      {
        color: 'red',
        weight: 2,
        fillColor: 'yellow',
        fillOpacity: 0.12,
        opacity: 1
      }
    ).addTo(map);

    hex.bindPopup(hexId);
  }
}

  // Zoom to test hex
  map.setView([centerY, centerX], 2);

  console.log('Hex overlay drawn');
</script>

</body>
</html>
