<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Marcellus+SC&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <meta charset="utf-8" />
  <title>Kadesh Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/panel.css">
<link rel="stylesheet" href="css/map.css">
<link rel="stylesheet" href="css/codex-shell.css">
<link rel="stylesheet" href="css/codex-search.css">
<link rel="stylesheet" href="css/codex-lists.css">
<link rel="stylesheet" href="css/codex-detail.css">
<link rel="stylesheet" href="css/mobile.css">
</head>

<body>

<div id="parchment-bg"></div>
<div id="map"></div>

<div id="map-reset-button" role="button" aria-label="Center Map"></div>
<div id="codex-button" role="button" aria-label="Open Codex"></div>

<div id="codex-overlay" class="closed">
  <div id="codex-modal">

    <div id="codex-header">
      <h2 id="codex-title">The Codex of Kadesh</h2>
    </div>

    <div id="codex-content">
      <button class="codex-section-button" type="button">Search</button>
      <button class="codex-section-button" type="button">Regions</button>
      <button class="codex-section-button" type="button">Points of Interest</button>
      <button class="codex-section-button" type="button">NPCs</button>
    </div>

    <div class="panel-nav codex-panel-nav">
      <button id="codex-back" type="button" disabled>← Back</button>
      <div id="codex-breadcrumbs"></div>
      <button id="codex-close" type="button">✗</button>
    </div>

  </div>
</div>
 
<div id="app-panel" class="closed right">
  <div id="app-panel-inner">

    <div id="app-panel-header">
      <div>
        <div id="panel-subtitle"></div>
        <h2 id="panel-title">Select a Hex</h2>
      </div>
    </div>

    <div id="panel-content">
      Click any hex to view its details.
    </div>

    <div class="panel-nav">
      <button id="mobile-panel-close" type="button">✗</button>
    </div>

  </div>
</div>
 
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/data-loader.js"></script>
<script src="js/app-core.js"></script>
<script src="js/map-ui.js"></script>
<script src="js/codex-core.js"></script>
<script src="js/codex-render.js"></script>
<script src="js/codex-labels.js"></script>
<script src="js/codex-query.js"></script>
<script src="js/codex-pages.js"></script>
<script src="js/app-events.js"></script>

</body>
</html>
