<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Kadesh Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body {
      margin: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: black;
    }

    #map {
      width: 100%;
      height: 100%;
      background: black;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // Create map using simple image coordinates instead of real-world lat/lng
    const map = L.map('map', {
      crs: L.CRS.Simple,
      minZoom: -2,
      maxZoom: 4
    });

    // Your image dimensions
    const imageWidth = 8192;
    const imageHeight = 8192;

    // Leaflet uses [Y, X], not [X, Y]
    const bounds = [[0, 0], [imageHeight, imageWidth]];

    // Add the map image
    L.imageOverlay('Kadesh.png', bounds).addTo(map);

    // Fit map to image
    map.fitBounds(bounds);

    // Force view to center for testing
    map.setView([4096, 4096], 0);

    // Loud test marker
    const testMarker = L.circleMarker([4096, 4096], {
      radius: 80,
      color: 'red',
      weight: 8,
      fillColor: 'yellow',
      fillOpacity: 1,
      opacity: 1
    }).addTo(map);

    testMarker.bindPopup('LOUD TEST MARKER').openPopup();

    console.log('Marker added:', testMarker);
    alert('Map script loaded');
  </script>
</body>
</html>
