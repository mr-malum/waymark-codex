<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Marcellus+SC&family=Macondo&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <meta charset="utf-8" />
  <title>Kadesh Codex</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/panel.css">
  <link rel="stylesheet" href="css/map.css">
  <link rel="stylesheet" href="css/codex-shell.css">
  <link rel="stylesheet" href="css/codex-row-list.css">
  <link rel="stylesheet" href="css/codex-search.css">
  <link rel="stylesheet" href="css/codex-lists.css">
  <link rel="stylesheet" href="css/codex-detail.css">
  <link rel="stylesheet" href="css/codex-assets.css">
  <link rel="stylesheet" href="css/codex-book-stage.css">
  <link rel="stylesheet" href="css/codex-book-search-rail-fix.css">
  <link rel="stylesheet" href="css/codex-book-debug-polish.css">
  <link rel="stylesheet" href="css/codex-left-manuscript.css">
  <link rel="stylesheet" href="css/codex-closed-overlay-hardening.css">
  <link rel="stylesheet" href="css/codex-map-tile-polish.css">
  <link rel="stylesheet" href="css/codex-image-modal.css">
  <link rel="stylesheet" href="css/codex-image-edge-cleanup.css">
  <link rel="stylesheet" href="css/mobile.css">
  <link rel="stylesheet" href="css/codex-mobile-foundation.css">
  <link rel="stylesheet" href="css/codex-mobile-nav-cluster.css">
  <link rel="stylesheet" href="css/codex-mobile-search-cleanup.css">
  <link rel="stylesheet" href="css/codex-mobile-utility.css">
  <link rel="stylesheet" href="css/codex-mobile-header-polish.css">
  <link rel="stylesheet" href="css/codex-mobile-regions.css">
  <link rel="stylesheet" href="css/codex-mobile-list-utility.css">
</head>

<body>

<div id="parchment-bg"></div>
<div id="map"></div>

<div id="map-reset-button" role="button" aria-label="Center Map"></div>
<div id="codex-button" role="button" aria-label="Open Codex"></div>

<div id="codex-overlay" class="closed">
  <div id="codex-modal">
    <div id="codex-book-stage">

      <div id="codex-left-manuscript" aria-hidden="true"></div>

      <div id="codex-header">
        <h2 id="codex-title">The Codex of Kadesh</h2>
      </div>

      <div id="codex-desktop-persistent-search" aria-label="Search the Codex">
        <input
          id="codex-desktop-search-input"
          type="search"
          placeholder="Consult the Codex..."
          autocomplete="off"
        >
        <button
          id="codex-desktop-search-action"
          type="button"
          aria-label="Focus search"
        >⌕</button>
      </div>

      <div id="codex-content">
        <button class="codex-section-button" type="button">Search</button>
        <button class="codex-section-button" type="button">Regions</button>
        <button class="codex-section-button" type="button">Points of Interest</button>
        <button class="codex-section-button" type="button">NPCs</button>
      </div>

      <div
        id="codex-global-search-modal"
        class="codex-global-search-modal"
        aria-hidden="true"
        onclick="handleCodexGlobalSearchBackdropClick(event)"
      ></div>

      <div class="panel-nav codex-panel-nav">
        <div id="codex-breadcrumbs"></div>

        <div class="codex-control-cluster" aria-label="Codex controls">
          <button
            id="codex-mobile-page-control"
            type="button"
            hidden
          ></button>

          <button
            id="codex-mobile-debug-toggle"
            type="button"
            aria-label="Toggle mobile layout guides"
          >Guides</button>

          <button id="codex-back" type="button" disabled aria-label="Back">❮</button>
          <button id="codex-search-button" type="button">Search</button>
          <button id="codex-close" type="button" aria-label="Close">✕</button>
        </div>
      </div>

    </div>
  </div>
</div>
 
<div id="app-panel" class="closed right">
  <div id="app-panel-inner">

    <div id="app-panel-header">
      <div>
        <div id="panel-subtitle"></div>
        <h2 id="panel-title">Select a Hex</h2>
      </div>
    </div>

    <div id="panel-content">
      Click any hex to view its details.
    </div>

    <div class="panel-nav">
      <button id="mobile-panel-close" type="button">✗</button>
    </div>

  </div>
</div>
 
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/data-loader.js"></script>
<script src="js/app-core.js"></script>
<script src="js/map-ui.js"></script>
<script src="js/codex-icons.js"></script>
<script src="js/codex-core.js"></script>
<script src="js/codex-render.js"></script>
<script src="js/codex-labels.js"></script>
<script src="js/codex-query.js"></script>
<script src="js/codex-detail-pages.js"></script>
<script src="js/codex-assets.js"></script>
<script src="js/codex-list-pages.js"></script>
<script src="js/codex-list-config.js"></script>
<script src="js/codex-search-page.js"></script>
<script src="js/codex-mobile-search-cleanup.js"></script>
<script src="js/codex-mobile-utility.js"></script>
<script src="js/codex-mobile-list-utility.js"></script>
<script src="js/codex-left-manuscript.js"></script>
<script src="js/codex-pages.js"></script>
<script src="js/codex-image-modal.js"></script>
<script src="js/app-events.js"></script>

</body>
</html>
