<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Kadesh Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="parchment-bg"></div>
<div id="map"></div>

<div id="app-panel" class="closed">
  <div id="app-panel-header">
    <button id="panel-close" type="button">×</button>

    <div>
      <div id="panel-subtitle">Hex</div>
      <h2 id="panel-title">Select a Hex</h2>
    </div>
  </div>

  <div id="panel-content">
    Click any hex to view its details.
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="hex-data.js"></script>

<script>
  // Create map
  const map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -3,
    maxZoom: 0.5,
    maxBoundsViscosity: 0.5
  });

  // Image dimensions
  const imageWidth = 8192;
  const imageHeight = 8192;

  // Image bounds
  const bounds = [[0, 0], [imageHeight, imageWidth]];

  // Add map image
  L.imageOverlay('Kadesh.png', bounds).addTo(map);

  // Fit map to image
  map.fitBounds(bounds);

  // Dynamic pan bounds based on zoom
  function updatePanBounds() {
    const zoom = map.getZoom();

    const padding =
      zoom < -2 ? 2000 :
      zoom < -1 ? 1200 :
      zoom < 0  ? 700  :
                  300;

    map.setMaxBounds([
      [-padding, -padding],
      [imageHeight + padding, imageWidth + padding]
    ]);
  }

  map.on('zoomend', updatePanBounds);
  updatePanBounds();

  // ============================================
  // TEST HEX: 300:300
  // AppSheet XY = 1.33,1
  // ============================================

  const centerX = (1.33 / 100) * imageWidth;
  const centerY = imageHeight - ((1 / 100) * imageHeight);

  const hexWidth = 105;
  const hexHeight = 155;

  function makeHex(centerX, centerY, width, height) {
    return [
      [centerY, centerX + width],
      [centerY + height * 0.5, centerX + width * 0.5],
      [centerY + height * 0.5, centerX - width * 0.5],
      [centerY, centerX - width],
      [centerY - height * 0.5, centerX - width * 0.5],
      [centerY - height * 0.5, centerX + width * 0.5]
    ];
  }

  const startX = centerX;
  const startY = centerY;

  // Estimated spacing
  const rowStepY = 162.22;
  const colStepX = 325.51;

  const oddColY = rowStepY / -2;
  const oddColX = colStepX / 2;

  function getHexCenter(xxx, yyy) {
    const row = xxx - 300;
    const col = yyy - 300;

    const pair = Math.floor(col / 2);
    const odd = col % 2;

    const x =
      startX +
      (pair * colStepX) +
      (odd * oddColX);

    const y =
      startY -
      (row * rowStepY) +
      (odd * oddColY);

    return { x, y };
  }

  let selectedHex = null;

  const defaultStyle = {
    color: '#ffffff',
    weight: 4,
    opacity: 0.10,
    fillColor: '#ffffff',
    fillOpacity: 0.015,
    className: 'hex-glow'
  };

  const hoverStyle = {
    opacity: 0.30,
    fillOpacity: 0.05,
    weight: 6
  };

  const selectedStyle = {
    opacity: 0.60,
    fillOpacity: 0.10,
    weight: 8
  };

  for (let xxx = 300; xxx < 350; xxx++) {
    for (let yyy = 300; yyy < 350; yyy++) {
      const { x, y } = getHexCenter(xxx, yyy);
      const hexId = `${xxx}:${yyy}`;

      const hex = L.polygon(
        makeHex(x, y, hexWidth, hexHeight),
        defaultStyle
      ).addTo(map);

      hex.on('mouseover', function () {
        if (this !== selectedHex) {
          this.setStyle(hoverStyle);
        }
      });

      hex.on('mouseout', function () {
        if (this !== selectedHex) {
          this.setStyle(defaultStyle);
        }
      });

      hex.on('click', function (e) {
        L.DomEvent.stopPropagation(e);

        if (selectedHex && selectedHex !== this) {
          selectedHex.setStyle(defaultStyle);
        }

        selectedHex = this;
        this.setStyle(selectedStyle);
        
        document.getElementById('app-panel').classList.add('open');
        
        const data = hexData?.[hexId];

        document.getElementById('panel-title').textContent =
          data?.name || hexId;

        document.getElementById('panel-content').innerHTML = `
          <p><strong>Hex:</strong> ${hexId}</p>
          <p><strong>Terrain:</strong> ${data?.terrain || 'Unknown'}</p>
          <p><strong>Description:</strong><br>
            ${data?.description || 'No known point of interest.'}
          </p>
        `;
      });
    }
  }

  map.on('click', function () {
  document.getElementById('app-panel').classList.remove('open');

  if (selectedHex) {
    selectedHex.setStyle(defaultStyle);
    selectedHex = null;
  }
});

  document.getElementById('panel-close').addEventListener('click', function () {
  document.getElementById('app-panel').classList.remove('open');

  if (selectedHex) {
    selectedHex.setStyle(defaultStyle);
    selectedHex = null;
  }
});
</script>

</body>
</html>
