<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Kadesh Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    html, body, #map {
      margin: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: black;
    }
  </style>
</head>

<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  const map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -2,
    maxZoom: 4
  });

  const imageWidth = 8192;
  const imageHeight = 8192;

  const bounds = [[0, 0], [imageHeight, imageWidth]];

  L.imageOverlay('Kadesh.png', bounds).addTo(map);
  map.fitBounds(bounds);

  // AppSheet XY for 300:300 = 1.33,1
  const centerX = (1.33 / 100) * imageWidth;
  const centerY = imageHeight - ((1 / 100) * imageHeight);

  const hexRadius = 70;

  function makeHex(centerX, centerY, radius) {
    const points = [];

    for (let i = 0; i < 6; i++) {
      const angle = Math.PI / 180 * (60 * i);
      const x = centerX + radius * Math.cos(angle);
      const y = centerY + radius * Math.sin(angle);
      points.push([y, x]);
    }

    return points;
  }

  const topLeftHex = L.polygon(
    makeHex(centerX, centerY, hexRadius),
    {
      color: 'red',
      weight: 3,
      fillColor: 'yellow',
      fillOpacity: 0.25,
      opacity: 1
    }
  ).addTo(map);

  topLeftHex.bindPopup('300:300');
  map.setView([centerY, centerX], 2);

  console.log('Hex drawn with inverted Y');
</script>
</body>
</html>
